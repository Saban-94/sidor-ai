<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SabanOS | Dashboard & Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .chat-height { height: calc(100vh - 280px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-blue-400">SabanOS Brain</h1>
            <p class="text-sm text-slate-400">מערכת ניטור וסנכרון בזמן אמת</p>
        </div>
        <div id="status-indicator" class="px-3 py-1 rounded-full bg-green-500/20 text-green-400 text-xs border border-green-500/30">
            מחובר למוח ✅
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="space-y-6">
            <div class="glass p-6 rounded-2xl">
                <h3 class="text-slate-400 text-sm mb-4">סטטוס מלאי ומשימות</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span>הזמנות פעילות</span>
                        <span class="text-blue-400 font-bold" id="order-count">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>פריטים בחסר</span>
                        <span class="text-red-400 font-bold" id="low-stock">0</span>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h3 class="text-slate-400 text-sm mb-4">פעולות מהירות</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="askAI('בצע ניתוח מלאי חסר')" class="bg-slate-700 hover:bg-slate-600 p-2 rounded-lg text-xs transition">ניתוח מלאי</button>
                    <button onclick="askAI('סכם את הזמנות היום')" class="bg-slate-700 hover:bg-slate-600 p-2 rounded-lg text-xs transition">סיכום יום</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 flex flex-col glass rounded-2xl overflow-hidden">
            <div class="bg-slate-800/50 p-4 border-b border-white/5">
                <h2 class="font-semibold text-lg">חדר תקשורת ודו"חות</h2>
            </div>

            <div id="chat-messages" class="chat-height overflow-y-auto p-4 space-y-4 flex flex-col">
                <div class="bg-blue-500/10 border border-blue-500/20 p-3 rounded-xl max-w-[80%] self-start">
                    <p class="text-sm">שלום אחי, אני המוח של SabanOS. איך אפשר לעזור היום?</p>
                    <span class="text-[10px] text-slate-500 mt-1 block">מערכת</span>
                </div>
            </div>

            <div class="p-4 bg-slate-800/30 border-t border-white/5">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="user-input" placeholder="שאל את המוח או שלח דיווח..." 
                        class="flex-1 bg-slate-900 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-semibold transition">שלח</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxPJR4bwo1M-1iWXeFMHiaBVI7Rkm5juGcqzPFW0XntKYaef6xsW2d_40Mpu3z9UWdN/exec"; // שים כאן את ה-URL של ה-Deployment

        const chatForm = document.getElementById('chat-form');
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');

        // פונקציה להוספת הודעה למסך
        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser ? 
                "bg-slate-700 p-3 rounded-xl max-w-[80%] self-end text-left" : 
                "bg-blue-600/20 border border-blue-500/30 p-3 rounded-xl max-w-[80%] self-start";
            
            div.innerHTML = `<p class="text-sm">${text}</p><span class="text-[10px] text-slate-500 mt-1 block">${isUser ? 'אתה' : 'SabanOS Brain'}</span>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // שליחה ל-GAS
        async function askAI(prompt) {
            addMessage(prompt, true);
            
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // חשוב בגלל מגבלות GAS
                    body: JSON.stringify({
                        action: 'askBrain',
                        prompt: prompt,
                        context: 'User interface dashboard interaction'
                    })
                });

                // בגלל no-cors לא ניתן לקרוא תגובה ישירות ב-Fetch רגיל, 
                // בגרסה מקצועית מומלץ להשתמש ב-JSONP או ב-Proxy.
                // כאן אני מוסיף אישור שליחה:
                addMessage("הבקשה נשלחה לעיבוד במוח... (בדיקה בסנכרון הבא)");
                
            } catch (error) {
                console.error("Error:", error);
                addMessage("תקלה בחיבור למוח.");
            }
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!userInput.value.trim()) return;
            askAI(userInput.value);
            userInput.value = '';
        });
    </script>
</body>
</html>
