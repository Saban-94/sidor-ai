<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SabanOS | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #020617; color: #e2e8f0; margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .log-row { animation: fadeIn 0.4s ease-out; border-right: 4px solid transparent; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .status-online { background: #10b981; box-shadow: 0 0 12px #10b981; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-2xl shadow-lg shadow-blue-500/20">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight text-white">Saban<span class="text-blue-500">OS</span></h1>
                    <p class="text-slate-500 text-sm font-medium">ניהול מלאי, הזמנות ומכירות - ח. סבן</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6 glass py-3 px-6 rounded-2xl">
                <div class="flex items-center gap-3">
                    <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-slate-600 transition-all"></div>
                    <span id="statusText" class="text-xs font-bold uppercase tracking-wider text-slate-400">Disconnected</span>
                </div>
                <div class="h-6 w-px bg-slate-800"></div>
                <div id="liveClock" class="mono text-blue-400 font-bold">00:00:00</div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-3xl border-b-4 border-emerald-500/50 hover:bg-white/5 transition">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-slate-500 text-xs font-bold uppercase">פריטים במלאי</span>
                    <span class="text-emerald-500 bg-emerald-500/10 p-2 rounded-lg">📦</span>
                </div>
                <h3 id="stat-inventory" class="text-4xl font-bold text-white">--</h3>
            </div>
            <div class="glass p-6 rounded-3xl border-b-4 border-blue-500/50 hover:bg-white/5 transition">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-slate-500 text-xs font-bold uppercase">הזמנות פעילות</span>
                    <span class="text-blue-500 bg-blue-500/10 p-2 rounded-lg">📑</span>
                </div>
                <h3 id="stat-orders" class="text-4xl font-bold text-white">--</h3>
            </div>
            <div class="glass p-6 rounded-3xl border-b-4 border-purple-500/50 hover:bg-white/5 transition">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-slate-500 text-xs font-bold uppercase">מכירות היום</span>
                    <span class="text-purple-500 bg-purple-500/10 p-2 rounded-lg">💰</span>
                </div>
                <h3 id="stat-sales" class="text-4xl font-bold text-white">--</h3>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h2 class="text-lg font-bold flex items-center gap-3">
                    <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                    Activity Stream
                </h2>
                <button onclick="document.getElementById('logsBody').innerHTML = ''" class="text-xs bg-slate-800 hover:bg-red-900/40 text-slate-400 hover:text-red-400 px-4 py-2 rounded-xl transition">נקה לוגים</button>
            </div>
            
            <div class="overflow-x-auto max-h-[500px]">
                <table class="w-full text-right">
                    <thead class="sticky top-0 bg-[#0f172a] text-slate-500 text-[11px] font-bold uppercase border-b border-white/5">
                        <tr>
                            <th class="p-5">זמן</th>
                            <th class="p-5">מחלקה</th>
                            <th class="p-5">מקור</th>
                            <th class="p-5">פעולה</th>
                            <th class="p-5 text-left">מסמך</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // הזרקת המשתנים מ-Code.gs (חשוב לעשות Deploy חדש)
        const PROJECT_ID = "<?= projectId ?>";
        const DATABASE_ID = "<?= databaseId ?>";

        firebase.initializeApp({ projectId: PROJECT_ID });
        const db = firebase.firestore().app.firestore(DATABASE_ID);

        const config = {
            'inventory': { label: 'מלאי', color: 'text-emerald-400 border-emerald-500', stat: 'stat-inventory' },
            'orders': { label: 'הזמנות', color: 'text-blue-400 border-blue-500', stat: 'stat-orders' },
            'sales': { label: 'מכירות', color: 'text-purple-400 border-purple-500', stat: 'stat-sales' }
        };

        // שעון חי
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('he-IL');
        }, 1000);

        function initMonitoring() {
            Object.keys(config).forEach(col => {
                db.collection(col).orderBy("updatedAt", "desc").limit(10).onSnapshot(snap => {
                    updateStatus(true);
                    document.getElementById(config[col].stat).innerText = snap.size;

                    snap.docChanges().forEach(change => {
                        if (change.type === "added" || change.type === "modified") {
                            renderLog(col, change.doc.data(), change.doc.id);
                        }
                    });
                }, err => {
                    console.error(err);
                    updateStatus(false);
                });
            });
        }

        function updateStatus(isOnline) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if(isOnline) {
                dot.className = "w-2.5 h-2.5 rounded-full status-online";
                text.innerText = "Connected Live";
                text.className = "text-xs font-bold uppercase tracking-wider text-emerald-400";
            } else {
                dot.className = "w-2.5 h-2.5 rounded-full bg-red-600";
                text.innerText = "Connection Failed";
            }
        }

        function renderLog(colName, data, id) {
            const body = document.getElementById('logsBody');
            const cfg = config[colName];
            const time = data.updatedAt ? new Date(data.updatedAt.seconds * 1000).toLocaleTimeString('he-IL') : '--:--';
            
            const row = `
                <tr class="log-row hover:bg-white/[0.03] transition ${cfg.color}">
                    <td class="p-5 mono text-xs text-slate-500">${time}</td>
                    <td class="p-5 font-bold text-xs uppercase tracking-widest">${cfg.label}</td>
                    <td class="p-5">
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                            <span class="text-sm font-semibold text-slate-200">${data.createdBy || 'System'}</span>
                        </div>
                    </td>
                    <td class="p-5 text-sm text-slate-300">
                        ${data.name || data.customerName || 'עדכון רשומה'}
                    </td>
                    <td class="p-5 text-left mono text-[10px] text-slate-600">${id}</td>
                </tr>
            `;
            body.insertAdjacentHTML('afterbegin', row);
            if (body.children.length > 30) body.lastElementChild.remove();
        }

        initMonitoring();
    </script>
</body>
</html>
