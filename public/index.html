<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SabanOS | Unified Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { transition: all 0.3s ease; border-bottom: 2px solid transparent; }
        .nav-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass sticky top-0 z-50 p-4 mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-bold italic text-blue-500 tracking-tighter text-white">SabanOS</span>
                <div id="connectionStatus" class="flex items-center gap-2 px-3 py-1 bg-slate-800 rounded-full text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <div class="w-2 h-2 rounded-full bg-slate-600"></div> Connecting...
                </div>
            </div>
            <div class="flex gap-6">
                <button onclick="switchTab('inventory')" class="nav-btn active px-2 py-1 font-bold text-sm">מלאי</button>
                <button onclick="switchTab('orders')" class="nav-btn px-2 py-1 font-bold text-sm">הזמנות</button>
                <button onclick="switchTab('sales')" class="nav-btn px-2 py-1 font-bold text-sm">מכירות</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass p-6 rounded-3xl">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2">סטטוס מלאי</p>
                <h3 id="count-inventory" class="text-4xl font-bold">--</h3>
            </div>
            <div class="glass p-6 rounded-3xl">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2">הזמנות פתוחות</p>
                <h3 id="count-orders" class="text-4xl font-bold">--</h3>
            </div>
            <div class="glass p-6 rounded-3xl">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2">מכירות היום</p>
                <h3 id="count-sales" class="text-4xl font-bold">--</h3>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
            <div id="inventory" class="tab-content active overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-900/50 text-slate-500 text-xs uppercase border-b border-white/5">
                        <tr><th class="p-4">מוצר</th><th class="p-4">כמות</th><th class="p-4">מקור</th><th class="p-4">עדכון אחרון</th></tr>
                    </thead>
                    <tbody id="inventoryBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
            
            <div id="orders" class="tab-content overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-900/50 text-slate-500 text-xs uppercase border-b border-white/5">
                        <tr><th class="p-4">לקוח</th><th class="p-4">סטטוס</th><th class="p-4">נהג</th><th class="p-4">זמן</th></tr>
                    </thead>
                    <tbody id="ordersBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>

            <div id="sales" class="tab-content overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-900/50 text-slate-500 text-xs uppercase border-b border-white/5">
                        <tr><th class="p-4">מספר עסקה</th><th class="p-4">סכום</th><th class="p-4">פריטים</th><th class="p-4">זמן</th></tr>
                    </thead>
                    <tbody id="salesBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // פרטי התחברות - וודא שזה מגיע מהשרת (או שתעדכן ידנית ל-Vercel)
        const config = { projectId: "saban-ai-drive" };
        const DB_ID = "ai-studio-cc5d2687-b402-4b97-b808-5ba700689e0e";

        firebase.initializeApp(config);
        const db = firebase.firestore().app.firestore(DB_ID);

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function setupListener(col, bodyId, countId, renderFn) {
            db.collection(col).orderBy("updatedAt", "desc").limit(20).onSnapshot(snap => {
                document.getElementById('connectionStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div> ONLINE';
                document.getElementById(countId).innerText = snap.size;
                const body = document.getElementById(bodyId);
                body.innerHTML = '';
                snap.forEach(doc => body.insertAdjacentHTML('beforeend', renderFn(doc.data(), doc.id)));
            });
        }

        // Render Functions
        const renderInventory = (d) => `<tr><td class="p-4 font-bold text-white">${d.name || '--'}</td><td class="p-4 text-emerald-400 font-mono">${d.quantity || 0}</td><td class="p-4 text-slate-400 text-sm">${d.createdBy || 'System'}</td><td class="p-4 text-slate-500 text-xs">${new Date(d.updatedAt?.seconds*1000).toLocaleTimeString()}</td></tr>`;
        const renderOrders = (d) => `<tr><td class="p-4 font-bold text-white">${d.customerName || '--'}</td><td class="p-4"><span class="px-2 py-0.5 bg-blue-500/20 text-blue-400 text-[10px] font-bold rounded">${d.status || 'PENDING'}</span></td><td class="p-4 text-slate-400 text-sm">${d.driverId || '--'}</td><td class="p-4 text-slate-500 text-xs">${new Date(d.updatedAt?.seconds*1000).toLocaleTimeString()}</td></tr>`;
        const renderSales = (d) => `<tr><td class="p-4 font-mono text-xs text-purple-400">${d.orderNumber || '--'}</td><td class="p-4 font-bold text-white">₪${d.totalAmount || 0}</td><td class="p-4 text-slate-400 text-sm">${d.itemCount || 0} פריטים</td><td class="p-4 text-slate-500 text-xs">${new Date(d.updatedAt?.seconds*1000).toLocaleTimeString()}</td></tr>`;

        // Start
        setupListener('inventory', 'inventoryBody', 'count-inventory', renderInventory);
        setupListener('orders', 'ordersBody', 'count-orders', renderOrders);
        setupListener('sales', 'salesBody', 'count-sales', renderSales);
    </script>
</body>
</html>
